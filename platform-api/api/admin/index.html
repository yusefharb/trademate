<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trademate Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🏗️</span>
        <h1 class="text-xl font-bold text-gray-900">Trademate Admin</h1>
      </div>
      <span class="text-sm text-gray-500" id="version">v0.1.0</span>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="stats-grid">
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <div class="text-sm text-gray-500 mb-1">Total Users</div>
        <div class="text-3xl font-bold text-gray-900" id="stat-users">--</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <div class="text-sm text-gray-500 mb-1">Active Subs</div>
        <div class="text-3xl font-bold text-green-600" id="stat-active">--</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <div class="text-sm text-gray-500 mb-1">Onboarded</div>
        <div class="text-3xl font-bold text-blue-600" id="stat-onboarded">--</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <div class="text-sm text-gray-500 mb-1">Total Leads</div>
        <div class="text-3xl font-bold text-purple-600" id="stat-leads">--</div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="bg-white rounded-xl shadow-sm border">
      <div class="px-6 py-4 border-b flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-900">Traders</h2>
        <button onclick="loadUsers()" class="text-sm text-blue-600 hover:text-blue-800">Refresh ↻</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Name</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Business</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Email</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Tier</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Status</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Onboarding</th>
              <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Joined</th>
            </tr>
          </thead>
          <tbody id="users-table-body" class="divide-y divide-gray-200">
            <tr><td colspan="7" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = '/api';

    async function fetchApi(path) {
      const res = await fetch(`${API_BASE}${path}`);
      return res.json();
    }

    async function loadStats() {
      try {
        const data = await fetchApi('/admin/stats');
        if (data.success) {
          document.getElementById('stat-users').textContent = data.data.total_users;
          document.getElementById('stat-active').textContent = data.data.active_subscriptions;
          document.getElementById('stat-onboarded').textContent = data.data.onboarding_completed;
          document.getElementById('stat-leads').textContent = data.data.total_leads;
        }
      } catch (e) {
        document.getElementById('stats-grid').innerHTML = 
          '<div class="col-span-full text-center py-8 text-red-500">Failed to load stats. Is the API running?</div>';
      }
    }

    async function loadUsers() {
      try {
        const data = await fetchApi('/admin/users');
        const tbody = document.getElementById('users-table-body');
        if (data.success && data.data.length > 0) {
          tbody.innerHTML = data.data.map(u => {
            const tierBadge = {
              starter: 'bg-gray-100 text-gray-600',
              growth: 'bg-blue-100 text-blue-600',
              pro: 'bg-purple-100 text-purple-600'
            }[u.tier] || 'bg-gray-100 text-gray-600';

            const statusBadge = {
              active: 'bg-green-100 text-green-600',
              trialing: 'bg-yellow-100 text-yellow-600',
              canceled: 'bg-red-100 text-red-600'
            }[u.subscription_status] || 'bg-gray-100 text-gray-600';

            return `<tr>
              <td class="px-6 py-4 text-sm font-medium text-gray-900">${u.name}</td>
              <td class="px-6 py-4 text-sm text-gray-500">${u.business_name || '--'}</td>
              <td class="px-6 py-4 text-sm text-gray-500">${u.email}</td>
              <td class="px-6 py-4"><span class="inline-flex px-2 py-1 text-xs font-medium rounded-full ${tierBadge}">${u.tier}</span></td>
              <td class="px-6 py-4"><span class="inline-flex px-2 py-1 text-xs font-medium rounded-full ${statusBadge}">${u.subscription_status}</span></td>
              <td class="px-6 py-4 text-sm">${u.onboarding_completed ? '✅' : '🔄 ' + u.onboarding_status}</td>
              <td class="px-6 py-4 text-sm text-gray-500">${new Date(u.created_at).toLocaleDateString()}</td>
            </tr>`;
          }).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-400">No users found</td></tr>';
        }
      } catch (e) {
        document.getElementById('users-table-body').innerHTML = 
          '<tr><td colspan="7" class="px-6 py-8 text-center text-red-500">Failed to load users</td></tr>';
      }
    }

    loadStats();
    loadUsers();
  </script>
</body>
</html>
